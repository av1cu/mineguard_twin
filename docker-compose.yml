version: '3.8'

services:
  backend:
    build: .
    container_name: mineguard_backend
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./cv_driver/models:/app/cv_driver/models
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend-next
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: mineguard_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Runs client-side in the user's browser (not container-to-container),
      # so this must be a URL reachable from the host machine, not the
      # in-network "backend" service name.
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
