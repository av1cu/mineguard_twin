version: '3.8'

services:
  backend:
    build: .
    container_name: mineguard_backend
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./cv_driver/models:/app/cv_driver/models
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: .
    container_name: mineguard_frontend
    command: streamlit run app/main.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./cv_slope/models:/app/cv_slope/models
      - ./cv_driver/models:/app/cv_driver/models
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://backend:8000
